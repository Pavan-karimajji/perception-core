# Perception Core CI Pipeline
stages:
  - static_analysis
  - build
  - test

static_analysis:
  stage: static_analysis
  script:
    - cppcheck --enable=all src/
    # - clang-tidy src/**/*.cpp

build_sil:
  stage: build
  script:
    - mkdir build && cd build
    - cmake .. -DTARGET_TYPE=sil -DBUILD_TESTING=ON
    - make -j$(nproc)

unit_tests:
  stage: test
  script:
    - cd build && ctest --output-on-failure
  needs: [build_sil]

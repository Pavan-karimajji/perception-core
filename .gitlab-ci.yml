# Perception Core CI Pipeline
stages:
  - static_analysis
  - build
  - test

static_analysis:
  stage: static_analysis
  script:
    - cppcheck --enable=all src/component
    # - clang-tidy src/component/**/*.cpp

build_sil:
  stage: build
  script:
    - mkdir build && cd build
    # AdasInterfaces_DIR must point at interfaces/cmake (sibling clone or submodule path)
    - cmake .. -DTARGET_TYPE=sil -DBUILD_TESTING=ON -DAdasInterfaces_DIR=../interfaces/cmake
    - make -j$(nproc)

unit_tests:
  stage: test
  script:
    - cd build && ctest --output-on-failure
  needs: [build_sil]

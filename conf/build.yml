# Per-project x per-part toolchain/platform mapping for this component.
#
# Two other axes are resolved elsewhere, not here:
#   - project  (which calibration numbers: projects/<name>/default.yaml)   -> superproject conf/<project>.yaml
#   - part     (which kind of deliverable: sil, later production/doc)     -> superproject conf/<project>.yaml
# This file only answers, for a given project+part already chosen upstream,
# which of *this component's own* toolchain presets to build with.
#
# Mirrors modules/df/conf/build.yml's shape exactly - see
# docs/project_variant_model.md for the full model and rationale.
#
# platforms: is consumed by build.py (superproject dispatcher) to resolve
# which platform to build with, and is now passed straight through as
# build.bat's second argument (build.bat <part> <platform>) - it drives the
# actual CMake preset name (<part>-<platform>), not just a log line.
# Platform token = compiler+arch+config as ONE string (matches a proven
# external reference's own convention): bare name (vs2026) is the default
# config, a trailing _debug suffix (vs2026_debug) is the explicit debug
# variant. build.bat's existing `standalone`/`sil`/`gtest` targets are
# unaffected by this.
#
# requires:/tool_requires: below ARE mechanically consumed - nested under
# variants/<project> only (not further per-part - see
# modules/df/conf/build.yml for why) - see that same file for the full
# explanation (docs/conan_requires_in_build_yml.md).
#
# layout_kind: plan.md item 10 (docs/build_conanfile_commonization_plan.md
# §2) - data read by the common scripts/build.py/conanfile.py templates so
# this component's real build shape never becomes a code branch there.
# package_kind removed entirely (item 10's own follow-up finding, plan.md,
# 2026-07-20) - this component's conanfile.py has no build()/package() yet
# (nothing to compile through Conan, even though settings/CMakeToolchain
# generation are still needed), but that was never actually read anywhere
# other than conanfile.py's layout(), which now branches on Conan's own
# self.package_type ("application") instead.
#
# Target keys (standalone:/sil:/gtest: below, §2.1a, revised 2026-07-20):
# no separate targets: field - every real target is its own explicit key
# under variants.<project>, discovered directly by build.py. sil:/gtest:
# reuse standalone:'s platforms: list via a YAML anchor/alias since all
# three build for the same toolchain today.

layout_kind: output_folder

# recipe: Conan-package identity read by the byte-identical conanfile.py
# template (plan.md item 20, docs/conanfile_commonality_plan.md §7.2). An
# application has no consumable artifact - only its package_type is needed.
recipe:
  type: application

variants:
  base:
    requires:
      - protobuf/3.21.12
      - adas-interfaces/1.0.0
    tool_requires:
      - protobuf/3.21.12
    standalone:
      platforms: &base_platforms
        - build: vs2026
        # - build: vs2026_debug      # <- illustrative only: no debug preset
        #                            #    exists yet in CMakePresets.json
        # - build: aarch64_qcc_qnx   # <- illustrative only: needs its own
        #                            #    toolchain file + preset first
        #                            #    (plan.md item 8)
    sil:
      platforms: *base_platforms
    gtest:
      platforms: *base_platforms
    # standalone: above is this component's own extra target, outside the
    # frozen common vocabulary - deliberately allowed (docs/build_grammar.md
    # §2: the vocabulary is the shared set every component may declare, not a
    # closed list nothing may extend).
    #
    # Rest of the frozen target vocabulary (plan.md item 14,
    # docs/build_grammar.md) - uncomment as each gains a real implementation:
    # coverage: { platforms: *base_platforms }        # gtest + OpenCppCoverage/gcov
    # docs:     { platforms: [{ build: noarch }] }    # doxygen; noarch = platform-independent
    # package:  { platforms: *base_platforms }        # conan create (+ --upload)
    # prod:     { platforms: [{ build: aarch64_qcc_qnx }, { build: tda4_ti }] }
  cus1:
    requires:
      - protobuf/3.21.12
      - adas-interfaces/1.0.0
    tool_requires:
      - protobuf/3.21.12
    standalone:
      platforms: &cus1_platforms
        - build: vs2026
    sil:
      platforms: *cus1_platforms
    gtest:
      platforms: *cus1_platforms
